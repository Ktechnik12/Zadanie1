plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.9.24'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
}

application {
    mainClass = "MainKt"
}

jar {
    manifest {
        attributes 'Main-Class': 'MainKt'
    }
}