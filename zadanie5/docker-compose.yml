version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ktechnik/zadanie5-server:latest
    container_name: ecommerce-server
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=production
    networks:
      - ecommerce-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: ktechnik/zadanie5-client:latest
    container_name: ecommerce-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    networks:
      - ecommerce-network
    restart: unless-stopped

networks:
  ecommerce-network:
    driver: bridge
